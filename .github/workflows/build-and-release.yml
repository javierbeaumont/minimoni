name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: linux-amd64
          - arch: linux-arm64

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build (amd64, Alpine musl)
        if: matrix.arch == 'linux-amd64'
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            alpine:latest \
            sh -c '
              set -e
              apk add --quiet --no-cache gcc musl-dev make xxd git
              git config --global --add safe.directory /work
              make release
            '

      - name: Build (arm64, cross-compile)
        if: matrix.arch == 'linux-arm64'
        run: |
          sudo apt-get install -qq -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu xxd
          make release CC=aarch64-linux-gnu-gcc STRIP=aarch64-linux-gnu-strip

      - name: Rename binary
        run: mv minimoni minimoni-${{ matrix.arch }}

      - uses: actions/upload-artifact@v5
        with:
          name: minimoni-${{ matrix.arch }}
          path: minimoni-${{ matrix.arch }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(head -n 1 RELEASE_NOTES.md | sed 's/^\*\*//;s/\*\*$//')
          tail -n +3 RELEASE_NOTES.md > /tmp/release-body.md
          gh release create ${{ github.ref_name }} \
            --title "$TITLE" \
            --notes-file /tmp/release-body.md \
            minimoni-linux-amd64 \
            minimoni-linux-arm64 \
            config.example.toml
