name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: linux-amd64
          - arch: linux-arm64
          - arch: linux-armv7
          - arch: linux-armv6

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        if: matrix.arch == 'linux-armv7' || matrix.arch == 'linux-armv6'
        uses: docker/setup-qemu-action@v3

      - name: Build (amd64, Alpine musl)
        if: matrix.arch == 'linux-amd64'
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            alpine:latest \
            sh -c '
              set -e
              apk add --quiet --no-cache gcc musl-dev make xxd git
              git config --global --add safe.directory /work
              make release
            '

      - name: Build (arm64, cross-compile)
        if: matrix.arch == 'linux-arm64'
        run: |
          sudo apt-get install -qq -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu xxd
          make release CC=aarch64-linux-gnu-gcc STRIP=aarch64-linux-gnu-strip

      - name: Build (armv7, Alpine musl in QEMU)
        if: matrix.arch == 'linux-armv7'
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v "$PWD":/work \
            -w /work \
            arm32v7/alpine:latest \
            sh -c '
              set -e
              apk add --quiet --no-cache gcc musl-dev make xxd git
              git config --global --add safe.directory /work
              make release
            '

      - name: Build (armv6, Alpine musl in QEMU)
        if: matrix.arch == 'linux-armv6'
        run: |
          docker run --rm --platform linux/arm/v6 \
            -v "$PWD":/work \
            -w /work \
            arm32v6/alpine:latest \
            sh -c '
              set -e
              apk add --quiet --no-cache gcc musl-dev make xxd git
              git config --global --add safe.directory /work
              make release
            '

      - name: Rename binaries
        run: |
          mv minimoni         minimoni-${{ matrix.arch }}
          mv minimoni-migrate minimoni-migrate-${{ matrix.arch }}

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.arch }}
          path: |
            minimoni-${{ matrix.arch }}
            minimoni-migrate-${{ matrix.arch }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            minimoni-linux-amd64
            minimoni-linux-arm64
            minimoni-linux-armv7
            minimoni-linux-armv6
            minimoni-migrate-linux-amd64
            minimoni-migrate-linux-arm64
            minimoni-migrate-linux-armv7
            minimoni-migrate-linux-armv6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(head -n 1 RELEASE_NOTES.md | sed 's/^\*\*//;s/\*\*$//')
          tail -n +3 RELEASE_NOTES.md > /tmp/release-body.md
          gh release create ${{ github.ref_name }} \
            --title "$TITLE" \
            --notes-file /tmp/release-body.md \
            minimoni-linux-amd64 \
            minimoni-linux-arm64 \
            minimoni-linux-armv7 \
            minimoni-linux-armv6 \
            minimoni-migrate-linux-amd64 \
            minimoni-migrate-linux-arm64 \
            minimoni-migrate-linux-armv7 \
            minimoni-migrate-linux-armv6 \
            config.example.toml \
            contrib/systemd/minimoni.service \
            contrib/systemd/minimoni-collect.service \
            contrib/systemd/minimoni-collect.timer
