name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -qq -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -type f \( -name "*.sh" -o -path "./hooks/*" \) \
            -not -path "./vendor/*" -not -path "./.git/*" -print0 \
          | xargs -0 -r shellcheck --severity=warning
