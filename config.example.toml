[server]
listen = "0.0.0.0:8080"
# threads       = 8  # HTTP worker threads (default: 8; raise if you have many concurrent users)
# sse_keepalive = 1  # keepalive interval in seconds; detects closed tabs without waiting for next push

[collect]
db        = "/var/lib/minimoni/metrics.db"
interval  = 60                              # seconds between samples (range: 1–3600)
disk_path = "/"

[dashboard]
# title       = "My Server"
# theme       = "auto"        # "auto" | "light" | "dark"
# show_footer = true
# refresh     = 30            # SSE push interval in seconds
# ranges      = ["1d", "7d", "30d", "90d"]  # largest value sets retention; units: m/h/d

# charts = ["cpu_load", "cpu_usage", "memory", "disk", "temp", "net"]
# cards  = ["cpu_load", "memory", "disk", "temp", "net", "uptime"]
# Omit to show all in default order. Set to [] to hide all. Listed order is respected.

# cpu_load_card_unit  = "abs"  # "%" | "abs" (% = normalized by core count)
# cpu_load_chart_unit = "abs"  # "%" | "abs"
# memory_card_unit    = "%"    # "%" | "mb" | "gb"
# memory_chart_unit   = "mb"   # "%" | "mb" | "gb"
# disk_card_unit      = "%"    # "%" | "gb" | "tb"
# disk_chart_unit     = "gb"   # "%" | "gb" | "tb"
# temp_card_unit      = "c"    # "%" | "c" | "f"
# temp_chart_unit     = "c"    # "%" | "c" | "f"
# temp_max            = 85     # 100% reference when temp_*_unit="%"
# net_card_unit       = "mb"   # "mb" | "gb" | "mbps" | "gbps"
# net_chart_unit      = "mb"   # "mb" | "gb" | "mbps" | "gbps"
# uptime_unit         = "auto" # "auto" | "h" | "d"

[[alert]]
name = "disk-full"
metric = "disk_percent"
operator = ">"
threshold = 90
webhook = "https://ntfy.sh/my-server"
cooldown = "1h"

[[alert]]
name = "high-temp"
metric = "temp"
operator = ">"
threshold = 80
command = "/usr/local/bin/alert.sh"
cooldown = "30m"
