<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)">
  <title>minimoni</title>
  <!-- Replaced with inline data URI by tools/bundle.sh at build time -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Replaced with inline <style> by tools/bundle.sh at build time -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header: title, uptime, range tabs, theme toggle ────────────── -->
  <header>
    <div>
      <h1 id="ttl">minimoni</h1>
      <div class="sub" id="upt"></div>
    </div>
    <div class="hdr-right">
      <div class="ranges" id="rngs"></div>
      <button id="thm">&#9728; Light</button>
    </div>
  </header>

  <!-- ── Metric cards (visibility and order driven by server config) ──
       All cards start hidden — the JS reveals each one only when its
       corresponding field arrives in the payload AND it's not excluded
       by cfgVisCards. -->
  <div class="cards">
    <div class="card" id="c-load" style="display:none">
      <div class="clabel">CPU Load
        <span class="card-unit" data-series="0" style="color:var(--clr-load1)">1m</span>
        <span class="card-unit hide" data-series="1" style="color:var(--clr-load5)">5m</span>
        <span class="card-unit hide" data-series="2" style="color:var(--clr-load15)">15m</span>
      </div>
      <div class="cval">&#8212;</div>
      <div class="csub">
        <span class="card-sub hide" data-card="load" data-idx="0"><span class="card-sub-lbl" style="color:var(--clr-load1)">1m</span> <span class="card-sub-val"></span></span>
        <span class="card-sub" data-card="load" data-idx="1"><span class="card-sub-lbl" style="color:var(--clr-load5)">5m</span> <span class="card-sub-val"></span></span>
        <span class="card-sub" data-card="load" data-idx="2"><span class="card-sub-lbl" style="color:var(--clr-load15)">15m</span> <span class="card-sub-val"></span></span>
      </div>
    </div>
    <div class="card" id="c-cpu" style="display:none">
      <div class="clabel">CPU Usage
        <span class="card-unit" data-series="0" style="color:var(--clr-cpu-user)">user</span>
        <span class="card-unit hide" data-series="1" style="color:var(--clr-cpu-sys)">sys</span>
      </div>
      <div class="cval">&#8212;</div>
      <div class="csub">
        <span class="card-sub hide" data-card="cpu" data-idx="0"><span class="card-sub-lbl" style="color:var(--clr-cpu-user)">user</span> <span class="card-sub-val"></span></span>
        <span class="card-sub" data-card="cpu" data-idx="1"><span class="card-sub-lbl" style="color:var(--clr-cpu-sys)">sys</span> <span class="card-sub-val"></span></span>
      </div>
    </div>
    <div class="card" id="c-mem" style="display:none">
      <div class="clabel">Memory
        <span class="card-unit" data-series="0" style="color:var(--clr-mem-used)">used</span>
        <span class="card-unit hide" data-series="1" style="color:var(--clr-mem-avail)">avail</span>
      </div>
      <div class="cval">&#8212;</div>
      <div class="csub">
        <span class="card-sub hide" data-card="mem" data-idx="0"><span class="card-sub-lbl" style="color:var(--clr-mem-used)">used</span> <span class="card-sub-val"></span></span>
        <span class="card-sub" data-card="mem" data-idx="1"><span class="card-sub-lbl" style="color:var(--clr-mem-avail)">avail</span> <span class="card-sub-val"></span></span>
      </div>
    </div>
    <div class="card" id="c-disk" style="display:none">
      <div class="clabel">Disk
        <span class="card-unit" data-series="0" style="color:var(--clr-disk-used)">used</span>
        <span class="card-unit hide" data-series="1" style="color:var(--clr-disk-free)">free</span>
      </div>
      <div class="cval">&#8212;</div>
      <div class="csub">
        <span class="card-sub hide" data-card="disk" data-idx="0"><span class="card-sub-lbl" style="color:var(--clr-disk-used)">used</span> <span class="card-sub-val"></span></span>
        <span class="card-sub" data-card="disk" data-idx="1"><span class="card-sub-lbl" style="color:var(--clr-disk-free)">free</span> <span class="card-sub-val"></span></span>
      </div>
    </div>
    <!-- Temperature card: hidden until the server confirms a valid sensor.
         Empty .csub keeps the row structure identical to other cards so the
         centred value lines up vertically with neighbours. -->
    <div class="card" id="c-temp" style="display:none">
      <div class="clabel">Temp</div>
      <div class="cval">&#8212;</div>
      <div class="csub"></div>
    </div>
    <div class="card" id="c-net" style="display:none">
      <div class="clabel">Network
        <span class="card-unit" data-series="0" style="color:var(--clr-net-tx)">↑</span>
        <span class="card-unit hide" data-series="1" style="color:var(--clr-net-rx)">↓</span>
      </div>
      <div class="cval">&#8212;</div>
      <div class="csub">
        <span class="card-sub hide" data-card="net" data-idx="0"><span class="card-sub-lbl" style="color:var(--clr-net-tx)">↑</span> <span class="card-sub-val"></span></span>
        <span class="card-sub" data-card="net" data-idx="1"><span class="card-sub-lbl" style="color:var(--clr-net-rx)">↓</span> <span class="card-sub-val"></span></span>
      </div>
    </div>
  </div>

  <!-- ── Chart panels (visibility and order driven by server config) ── -->
  <div class="charts">
    <div class="cbox" id="b-load">
      <div class="chdr">
        <span class="ctitle">CPU Load</span>
        <div class="legend" id="leg-g-load" data-chart="g-load">
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="1m series" data-series="0"><span class="leg-dot" style="background:var(--clr-load1)"></span>1m</span>
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="5m series" data-series="1"><span class="leg-dot" style="background:var(--clr-load5)"></span>5m</span>
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="15m series" data-series="2"><span class="leg-dot" style="background:var(--clr-load15)"></span>15m</span>
        </div>
      </div>
      <canvas id="g-load" role="img" aria-label="CPU Load history chart"></canvas>
    </div>
    <div class="cbox" id="b-cpu">
      <div class="chdr">
        <span class="ctitle">CPU Usage</span>
        <div class="legend" id="leg-g-cpu" data-chart="g-cpu">
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="user series" data-series="0"><span class="leg-dot" style="background:var(--clr-cpu-user)"></span>user</span>
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="sys series" data-series="1"><span class="leg-dot" style="background:var(--clr-cpu-sys)"></span>sys</span>
        </div>
      </div>
      <canvas id="g-cpu" role="img" aria-label="CPU Usage history chart"></canvas>
    </div>
    <div class="cbox" id="b-mem">
      <div class="chdr">
        <span class="ctitle">Memory</span>
        <div class="legend" id="leg-g-mem" data-chart="g-mem">
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="used series" data-series="0"><span class="leg-dot" style="background:var(--clr-mem-used)"></span>used</span>
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="avail series" data-series="1"><span class="leg-dot" style="background:var(--clr-mem-avail)"></span>avail</span>
        </div>
      </div>
      <canvas id="g-mem" role="img" aria-label="Memory history chart"></canvas>
    </div>
    <div class="cbox" id="b-disk">
      <div class="chdr">
        <span class="ctitle">Disk</span>
        <div class="legend" id="leg-g-disk" data-chart="g-disk">
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="used series" data-series="0"><span class="leg-dot" style="background:var(--clr-disk-used)"></span>used</span>
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="free series" data-series="1"><span class="leg-dot" style="background:var(--clr-disk-free)"></span>free</span>
        </div>
      </div>
      <canvas id="g-disk" role="img" aria-label="Disk history chart"></canvas>
    </div>
    <!-- Temperature panel: hidden by default; shown only when pts contain
         at least one non-null temperature sample -->
    <div class="cbox hide" id="b-temp">
      <div class="chdr"><span class="ctitle">Temperature</span></div>
      <canvas id="g-temp" role="img" aria-label="Temperature history chart"></canvas>
    </div>
    <div class="cbox" id="b-net">
      <div class="chdr">
        <span class="ctitle">Network</span>
        <div class="legend" id="leg-g-net" data-chart="g-net">
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="rx series" data-series="0"><span class="leg-dot" style="background:var(--clr-net-rx)"></span>↓</span>
          <span class="leg-item" tabindex="0" role="checkbox" aria-checked="true" aria-label="tx series" data-series="1"><span class="leg-dot" style="background:var(--clr-net-tx)"></span>↑</span>
        </div>
      </div>
      <canvas id="g-net" role="img" aria-label="Network history chart"></canvas>
    </div>
  </div>

  <!-- ── Footer: shown only when show_footer=true in server config ──── -->
  <footer id="ftr" style="display:none">
    <a href="https://github.com/javierbeaumont/minimoni" target="_blank" rel="noopener noreferrer">minimoni</a>
    <span id="ftr-ver"></span> — zero-dependency system monitoring
  </footer>

  <!-- Tooltip panel — follows the cursor over a chart. In locked mode
       the values are taken from the locked timestamp on whichever chart
       is hovered. -->
  <div id="tt" class="hide" aria-hidden="true"></div>

  <!-- Replaced with inline <script> by tools/bundle.sh at build time -->
  <script src="app.js"></script>

</body>
</html>
